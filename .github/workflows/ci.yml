name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run tests
      run: |
        echo "Running Python syntax check..."
        python -m py_compile scripts/*.py
    
    - name: Lint code
      run: |
        pip install flake8
        flake8 scripts/ --count --select=E9,F63,F7,F82 --show-source --statistics || true

  quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Count files
      run: |
        echo "📦 Total files: $(find . -type f -not -path './.git/*' | wc -l)"
        echo "📝 Python files: $(find . -name '*.py' -not -path './.git/*' | wc -l)"
        echo "📚 Documentation: $(find . -name '*.md' -not -path './.git/*' | wc -l)"
